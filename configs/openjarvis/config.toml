# OpenJarvis configuration — remote Ollama host

# ═══════════════════════════════════════════════════════════
# PILLAR 1: Intelligence — The Model
# ═══════════════════════════════════════════════════════════
[intelligence]
default_model = "qwen3.5:9b"
fallback_model = "qwen3.5:4b"
preferred_engine = "ollama"
provider = "remote"
quantization = "none"
# Generation defaults
temperature = 0.0
max_tokens = 2048
top_p = 0.9
top_k = 40
repetition_penalty = 1.0

# ═══════════════════════════════════════════════════════════
# PILLAR 2: Agent — The Agentic Harness
# ═══════════════════════════════════════════════════════════
[agent]
default_agent = "deep_research"
max_turns = 8
tools = "code_interpreter,web_search,file_read,calculator,think,knowledge_search,knowledge_sql,scan_chunks"
objective = "Answer questions accurately using available tools and documents"
context_from_memory = true

# ═══════════════════════════════════════════════════════════
# PILLAR 3: Tools — MCP Interface
# ═══════════════════════════════════════════════════════════
[tools.storage]
default_backend = "sqlite"
db_path = "~/.openjarvis/memory.db"

[tools.mcp]
enabled = true

# ═══════════════════════════════════════════════════════════
# PILLAR 4: Engine — The Inference Runtime
# ═══════════════════════════════════════════════════════════
[engine]
default = "ollama"

[engine.vllm]
host = "http://localhost:8001"

[engine.ollama]
host = "http://172.16.33.200:11434"

[engine.sglang]
host = "http://localhost:30000"

[engine.llamacpp]
host = "http://localhost:8080"

[engine.exo]
host = "http://localhost:52415"

[engine.nexa]
host = "http://localhost:18181"
# device = "npu"  # optional: cpu, gpu, npu

[engine.uzu]
host = "http://localhost:8080"

[engine.apple_fm]
host = "http://localhost:8079"

# ═══════════════════════════════════════════════════════════
# PILLAR 5: Learning — Improvement Methodologies
# ═══════════════════════════════════════════════════════════
[learning]
enabled = false

[learning.routing]
policy = "heuristic"

[learning.intelligence]
policy = "none"

[learning.agent]
policy = "none"

[learning.metrics]
accuracy_weight = 0.6
latency_weight = 0.2
cost_weight = 0.1
efficiency_weight = 0.1

# ═══════════════════════════════════════════════════════════
# Supporting config
# ═══════════════════════════════════════════════════════════
[telemetry]
enabled = true
db_path = "~/.openjarvis/telemetry.db"
gpu_metrics = true
gpu_poll_interval_ms = 50
energy_vendor = ""
warmup_samples = 0
steady_state_window = 5
steady_state_threshold = 0.05

[traces]
enabled = true
db_path = "~/.openjarvis/traces.db"

[server]
host = "0.0.0.0"
port = 8010
agent = "deep_research"

# ═══════════════════════════════════════════════════════════
# PILLAR 6: Speech — Voice Input/Output
# ═══════════════════════════════════════════════════════════
[speech]
backend = "faster-whisper"
model = "base"           # Options: tiny, base, small, medium, large-v3
device = "cpu"           # Use "cuda" for GPU, "cpu" for CPU
compute_type = "int8"    # For CPU. Use "float16" for GPU

